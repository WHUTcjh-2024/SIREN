<style id="ai-assistant-critical">
  #ai-assistant-root #ai-chat-panel:not(.is-open),
  #ai-assistant-root #ai-chat-backdrop:not(.is-open) {
    position: fixed !important;
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }
  #ai-assistant-root #ai-chat-panel:not(.is-open) {
    z-index: -1 !important;
  }
</style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/ai_assistant.css') }}?v=16">
<link rel="stylesheet" href="{{ url_for('static', filename='css/companion_motivation.css') }}?v=2">

<div id="ai-assistant-root" data-lazy="true">
  <div id="ai-chat-backdrop" aria-hidden="true"></div>

  <button type="button" id="ai-mascot-btn" aria-label="打开智慧星" title="点击与智慧星交流">
    <span class="ai-mascot-glow" aria-hidden="true"></span>
    <span class="ai-mascot-ring" aria-hidden="true"></span>
    <span class="ai-mascot-shadow" aria-hidden="true"></span>

    <div class="ai-mascot-character" aria-hidden="true">
      <img
        class="ai-mascot-base"
        src="{{ url_for('static', filename='img/ai-mascot-graduate-transparent.png') }}?v=10"
        data-fallback="{{ url_for('static', filename='img/ai-mascot-graduate.png') }}?v=10"
        alt=""
        width="200"
        height="450"
        loading="lazy"
        decoding="async"
        fetchpriority="low"
        draggable="false"
      />
      <span class="ai-mascot-blink ai-mascot-blink-l"></span>
      <span class="ai-mascot-blink ai-mascot-blink-r"></span>
    </div>

    <img
      class="ai-mascot-img ai-mascot-img-fallback"
      src="{{ url_for('static', filename='img/ai-mascot-graduate-transparent.png') }}?v=10"
      alt="智慧星"
      width="200"
      height="450"
      loading="lazy"
      decoding="async"
      fetchpriority="low"
      draggable="false"
    />

    <span class="ai-mascot-badge" aria-hidden="true">AI</span>
    <span class="ai-mascot-hint" aria-hidden="true">点我提问</span>
  </button>

  <div id="ai-chat-panel" role="dialog" aria-labelledby="ai-chat-title">
    <header class="ai-chat-header">
      <img
        class="ai-header-mascot"
        src="{{ url_for('static', filename='img/ai-mascot-graduate-transparent.png') }}?v=10"
        alt=""
        width="56"
        height="56"
        draggable="false"
      />
      <div class="ai-header-title">
        <h3 id="ai-chat-title">智慧星</h3>
        <p><span class="ai-status-dot"></span>学习激励 · 情感陪伴 · 物理辅导</p>
      </div>
      <button type="button" id="ai-close-btn" aria-label="关闭"><i class="fa fa-times"></i></button>
    </header>

    <div class="ai-ethics-modal" style="padding:8px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;">
      AI 用于答疑与读图辅助，不替代原始数据与公式推导；报告须注明人工复核项。
    </div>

    <div id="ai-chat-messages"></div>

    <div id="ai-quick-suggestions" class="ai-quick-suggestions" hidden>
      <div class="ai-quick-label"><span aria-hidden="true">💡</span> 快速建议</div>
      <div id="ai-quick-chips" class="ai-quick-chips"></div>
    </div>

    <footer id="ai-chat-footer">
      <div class="ai-input-row">
        <textarea id="ai-chat-input" rows="1" placeholder="输入实验相关问题…（Enter 发送）"></textarea>
        <button type="button" id="ai-send-btn" aria-label="发送"><i class="fa fa-paper-plane"></i></button>
      </div>
    </footer>
  </div>
</div>

<script defer src="{{ url_for('static', filename='js/ai_assistant_loader.js') }}?v=2"></script>
